name = "planning-poker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Serve the frontend (public/) as static assets.
[assets]
directory = "./public"
binding = "ASSETS"

# One Durable Object instance per room holds live state + WebSockets.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
