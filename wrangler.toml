name = "planning-poker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Serve the frontend (public/) as static assets.
[assets]
directory = "./public"
binding = "ASSETS"

# One Durable Object instance per room holds live state + WebSockets.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# D1 (SQLite) database for persistent history: rooms, rounds and votes.
# Create it once with:  wrangler d1 create planning-poker
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "planning-poker"
database_id = "7d221b8d-b7b8-461c-8c48-428080007098"
